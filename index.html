<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="말폭탄은 입력한 문장을 브라우저 화면 안에서 애니메이션으로 보여주는 작은 놀이 도구입니다. 입력값과 이미지는 서버로 전송되지 않습니다."
    />
    <meta name="robots" content="index, follow" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="말폭탄" />
    <meta
      property="og:description"
      content="브라우저 안에서만 동작하는 문장 애니메이션 도구입니다."
    />
    <meta property="og:url" content="https://peace-sandy.vercel.app/" />
    <title>말폭탄</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="game" aria-label="말폭탄 애니메이션" data-mode="classic">
      <div class="version-control" aria-label="버전 선택">
        <button class="version-option is-active" type="button" data-version="classic">bamti</button>
        <button class="version-option" type="button" data-version="custom">custom</button>
      </div>

      <section class="stage-wrap">
        <div class="stage" id="stage">
          <div class="fallback-art" id="fallbackArt" aria-hidden="true">
            <div class="fallback-face" id="characterFace">
              <span class="character-extra cap"></span>
              <span class="character-extra cap-brim"></span>
              <span class="character-extra ear ear-left"></span>
              <span class="character-extra ear ear-right"></span>
              <span class="character-extra whisker whisker-left top"></span>
              <span class="character-extra whisker whisker-left bottom"></span>
              <span class="character-extra whisker whisker-right top"></span>
              <span class="character-extra whisker whisker-right bottom"></span>
              <span class="eye eye-left"></span>
              <span class="eye eye-right"></span>
              <span class="mouth"></span>
            </div>
          </div>
          <div class="mouth-anchor" id="mouthAnchor" aria-hidden="true"></div>
          <div class="pin-marker" id="pinMarker" aria-hidden="true"></div>
          <div class="blast-layer" id="blastLayer" aria-hidden="true"></div>
        </div>
      </section>

      <section class="control-panel" aria-label="입력 패널">
        <p class="mode-note" id="modeNote">
          1버전: 현재 구성 유지. 캐릭터만 바꾸고 바로 발사할 수 있어요.
        </p>

        <div class="character-control" aria-label="캐릭터 선택">
          <button class="character-option is-active" type="button" data-character="default">기본</button>
          <button class="character-option" type="button" data-character="baseball">야구</button>
          <button class="character-option" type="button" data-character="rabbit">토끼</button>
          <button class="character-option" type="button" data-character="cat">고양이</button>
        </div>

        <label class="background-control">
          <span>배경 이미지</span>
          <input id="backgroundInput" type="file" accept="image/*" />
        </label>

        <p class="pin-help" id="pinHelp">
          배경을 넣은 뒤, 스테이지에서 소리가 시작될 위치를 탭해서 핀을 옮기세요.
        </p>

        <form class="sentence-form" id="sentenceForm" autocomplete="off">
          <div class="input-row">
            <input
              id="sentenceInput"
              type="text"
              autocomplete="off"
              autocapitalize="off"
              spellcheck="false"
              placeholder="예: 나 오늘 진짜 최고야"
              maxlength="80"
            />
            <button type="submit">발사</button>
          </div>
        </form>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
